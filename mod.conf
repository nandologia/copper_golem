name = copper_golem
title = Copper Golem
description = Adds a build-to-spawn Copper Golem to Mineclonia. It sorts nearby chests (carrying like items together and compacting stacks), oxidises through four stages over time (scrape it back with an axe, wax it with a honeycomb, or reset it with lightning), and is killable like an iron golem. Self-contained: no mob framework.
# Hard deps: we override the carved pumpkin (mcl_farming) and read copper block
# names (mcl_copper). Both must load before us so the override sees them.
depends = mcl_copper, mcl_farming
# Soft deps: chest organising and waxing degrade gracefully if absent.
optional_depends = mcl_chests, mcl_honey
